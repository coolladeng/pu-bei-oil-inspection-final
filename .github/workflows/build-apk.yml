name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools"
      - name: Setup SDK path
        run: |
          ANDROID_SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          echo "sdk.dir=$ANDROID_SDK" > android/local.properties
          echo "Using SDK: $ANDROID_SDK"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"
      - name: Build APK
        working-directory: android
        run: |
          set -o pipefail
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee ../assemble.log
          exit ${PIPESTATUS[0]}
      - name: List APK files
        run: find . -name "*.apk" -type f -ls
      - name: Upload assemble log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assemble-log
          path: assemble.log
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk