name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Create local.properties
        run: echo "sdk.dir=" > android/local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Check dependency conflicts
        working-directory: android
        run: |
          set -o pipefail
          gradle app:dependencies --configuration debugRuntimeClasspath --no-daemon 2>&1 | tee deps.log

      - name: Build APK (no daemon, full stacktrace)
        working-directory: android
        run: |
          set -o pipefail
          gradle assembleDebug --no-daemon --stacktrace -Pandroid.enableR8=false 2>&1 | tee assemble.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            android/assemble.log
            android/deps.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/*.apk"
